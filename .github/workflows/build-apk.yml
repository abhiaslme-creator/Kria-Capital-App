name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Android platform files (if missing)
        run: |
          if [ ! -d "android" ]; then
            flutter create --project-name kria_capital_app --platforms=android --org com.kriacapital .
          fi

      - name: Add INTERNET permission for WebView
        run: |
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Set app display name
        run: |
          sed -i 's/android:label="[^"]*"/android:label="KRIA CAPITAL"/' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kria-capital-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
